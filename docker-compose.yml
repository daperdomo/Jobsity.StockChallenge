services:
  web:
    build:
      context: .
      dockerfile: Jobsity.StockChallenge/Dockerfile
      target: web
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=JobsityStockChallenge;User Id=sa;Password=${SQL_SERVER_PASSWORD:-Jobsity_StockChallenge_2026!};TrustServerCertificate=True;MultipleActiveResultSets=true"
      RabbitMq__host: rabbitmq
      RabbitMq__username: guest
      RabbitMq__password: guest
      RabbitMq__requestQueue: stock.commands
      RabbitMq__responseQueue: chat.messages
    ports:
      - "8080:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: Jobsity.StockChallenge/Dockerfile
      target: bot
    environment:
      DOTNET_ENVIRONMENT: Docker
      RabbitMq__host: rabbitmq
      RabbitMq__username: guest
      RabbitMq__password: guest
      RabbitMq__requestQueue: stock.commands
      RabbitMq__responseQueue: chat.messages
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQL_SERVER_PASSWORD:-Jobsity_StockChallenge_2026!}"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" -b || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\" -b"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

volumes:
  sqlserver-data:
